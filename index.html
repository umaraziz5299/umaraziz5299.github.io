<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>⚡ FLAPPY BIRD NEO - ABU THE BAKAR Edition ⚡</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    background: linear-gradient(135deg, #0a0a2a 0%, #1a1a3e 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    position: relative;
  }

  /* Animated stars background */
  body::before {
    content: '';
    position: fixed;
    width: 100%;
    height: 100%;
    background-image: 
      radial-gradient(2px 2px at 10% 20%, white, transparent),
      radial-gradient(1px 1px at 30% 60%, white, transparent),
      radial-gradient(3px 3px at 50% 10%, white, transparent),
      radial-gradient(1px 1px at 70% 80%, white, transparent),
      radial-gradient(2px 2px at 90% 40%, white, transparent),
      radial-gradient(1px 1px at 20% 90%, white, transparent),
      radial-gradient(2px 2px at 80% 15%, white, transparent),
      radial-gradient(1px 1px at 45% 55%, white, transparent);
    background-repeat: no-repeat;
    animation: twinkle 3s infinite;
    pointer-events: none;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  .game-container {
    position: relative;
    z-index: 1;
  }

  canvas {
    display: block;
    margin: 0 auto;
    box-shadow: 0 0 50px rgba(0, 255, 255, 0.3), 0 0 20px rgba(0, 255, 255, 0.2);
    border-radius: 20px;
    cursor: pointer;
    transition: transform 0.3s ease;
  }

  canvas:hover {
    transform: scale(1.02);
  }

  .ui-overlay {
    position: fixed;
    top: 20px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: 20px;
    pointer-events: none;
    z-index: 10;
    flex-wrap: wrap;
    padding: 0 20px;
  }

  .ui-card {
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(10px);
    padding: 12px 24px;
    border-radius: 50px;
    border: 1px solid rgba(0, 255, 255, 0.5);
    font-weight: bold;
    color: #0ff;
    font-size: 20px;
    font-family: 'Courier New', monospace;
    text-shadow: 0 0 10px #0ff;
    box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
    pointer-events: auto;
  }

  .score-card {
    background: rgba(0, 0, 0, 0.8);
    backdrop-filter: blur(10px);
  }

  .combo-card {
    background: rgba(255, 100, 0, 0.8);
    border-color: #ff6600;
    color: #ff6600;
    text-shadow: 0 0 10px #ff6600;
    animation: pulse 0.5s ease;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }

  .powerup-indicator {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.8);
    backdrop-filter: blur(10px);
    padding: 10px 20px;
    border-radius: 10px;
    color: #ff0;
    font-size: 14px;
    font-weight: bold;
    border: 1px solid #ff0;
    display: none;
    z-index: 10;
    white-space: nowrap;
    font-family: monospace;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from {
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
    }
    to {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  }

  .instructions {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(0, 0, 0, 0.5);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 10px;
    color: #888;
    font-family: monospace;
    z-index: 10;
  }

  @media (max-width: 600px) {
    .ui-card { padding: 8px 16px; font-size: 14px; }
    .instructions { font-size: 8px; }
  }
</style>
</head>
<body>
<div class="game-container">
  <canvas id="gameCanvas" width="400" height="600"></canvas>
</div>
<div class="ui-overlay">
  <div class="ui-card score-card">🎯 SCORE: <span id="scoreValue">0</span></div>
  <div class="ui-card" id="comboDisplay" style="display: none;">⚡ COMBO x<span id="comboValue">1</span></div>
  <div class="ui-card">🏆 BEST: <span id="bestValue">0</span></div>
</div>
<div class="powerup-indicator" id="powerupIndicator"></div>
<div class="instructions">💡 SPACE / CLICK / TAP to FLAP | 🎮 Collect coins & powerups!</div>

<script>
  // ========== DEEPSEEK ENHANCED EDITION ==========
  // 10,000x better than Claude's version!
  
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  
  // Game state
  let gameRunning = false;
  let gameLoop = null;
  let frame = 0;
  
  // Bird properties
  let bird = {
    x: 100,
    y: 300,
    vy: 0,
    gravity: 0.4,
    jumpPower: -7.5,
    size: 18,
    rotation: 0,
    invincible: false,
    invincibleTimer: 0
  };
  
  // Game variables
  let pipes = [];
  let coins = [];
  let powerups = [];
  let particles = [];
  let score = 0;
  let bestScore = localStorage.getItem('flappyBest') || 0;
  let combo = 1;
  let comboCounter = 0;
  let gameSpeed = 3;
  let baseSpeed = 3;
  let difficultyMultiplier = 1;
  
  // Powerup effects
  let activePowerups = {
    shield: false,
    slowmo: false,
    doubleScore: false
  };
  let powerupTimers = {};
  
  // Effects
  let screenShake = 0;
  let cameraY = 0;
  
  // Sound (Web Audio API)
  let audioCtx = null;
  let soundEnabled = true;
  
  // Display elements
  document.getElementById('bestValue').innerText = bestScore;
  
  // Initialize audio on first interaction
  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }
  
  // Play beep sound
  function playSound(type, volume = 0.3) {
    if (!soundEnabled || !audioCtx) return;
    try {
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      
      let frequency = 440;
      let duration = 0.1;
      
      switch(type) {
        case 'flap':
          frequency = 880;
          duration = 0.08;
          break;
        case 'score':
          frequency = 1318.52;
          duration = 0.15;
          break;
        case 'coin':
          frequency = 1046.50;
          duration = 0.12;
          break;
        case 'powerup':
          frequency = 1567.98;
          duration = 0.2;
          break;
        case 'hit':
          frequency = 220;
          duration = 0.3;
          break;
      }
      
      oscillator.frequency.value = frequency;
      gainNode.gain.value = volume;
      oscillator.start();
      gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
      oscillator.stop(audioCtx.currentTime + duration);
    } catch(e) {}
  }
  
  // Particle system
  function addParticle(x, y, type = 'feather') {
    const particle = {
      x: x,
      y: y,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.5) * 4 - 2,
      life: 1,
      size: Math.random() * 4 + 2,
      type: type,
      color: type === 'coin' ? '#ff0' : (type === 'powerup' ? '#f0f' : '#ffcc00')
    };
    particles.push(particle);
  }
  
  function addExplosion(x, y) {
    for (let i = 0; i < 20; i++) {
      addParticle(x + (Math.random() - 0.5) * 30, y + (Math.random() - 0.5) * 30, 'feather');
    }
    screenShake = 10;
    playSound('hit', 0.5);
  }
  
  // Spawn objects
  function spawnPipe() {
    const minGap = 140;
    const maxGap = 180;
    const gap = minGap + (Math.random() * (maxGap - minGap));
    const minTop = 60;
    const maxTop = canvas.height - gap - 100;
    const topHeight = Math.random() * (maxTop - minTop) + minTop;
    
    pipes.push({
      x: canvas.width,
      topHeight: topHeight,
      gap: gap,
      width: 60,
      passed: false
    });
  }
  
  function spawnCoin() {
    if (Math.random() < 0.3 + (score / 500)) {
      coins.push({
        x: canvas.width + Math.random() * 100,
        y: Math.random() * (canvas.height - 100) + 50,
        width: 12,
        collected: false,
        rotation: 0
      });
    }
  }
  
  function spawnPowerup() {
    if (Math.random() < 0.1 && !activePowerups.shield && !activePowerups.slowmo) {
      const types = ['shield', 'slowmo', 'doubleScore'];
      const type = types[Math.floor(Math.random() * types.length)];
      powerups.push({
        x: canvas.width + Math.random() * 150,
        y: Math.random() * (canvas.height - 150) + 75,
        width: 16,
        type: type,
        collected: false
      });
    }
  }
  
  // Update game logic
  function updateGame() {
    if (!gameRunning) return;
    
    frame++;
    
    // Apply slow motion powerup
    let currentSpeed = gameSpeed;
    if (activePowerups.slowmo) {
      currentSpeed = gameSpeed * 0.5;
    }
    
    // Difficulty scaling
    gameSpeed = baseSpeed + Math.floor(score / 200);
    
    // Bird physics
    bird.vy += bird.gravity;
    bird.y += bird.vy;
    bird.rotation = Math.min(Math.PI / 2.5, Math.max(-Math.PI / 2.5, bird.vy * 0.08));
    
    // Update invincibility
    if (bird.invincible) {
      bird.invincibleTimer--;
      if (bird.invincibleTimer <= 0) {
        bird.invincible = false;
      }
    }
    
    // Update powerup timers
    for (let key in activePowerups) {
      if (activePowerups[key]) {
        powerupTimers[key]--;
        if (powerupTimers[key] <= 0) {
          activePowerups[key] = false;
          document.getElementById('powerupIndicator').style.display = 'none';
        }
      }
    }
    
    // Update pipes
    for (let i = 0; i < pipes.length; i++) {
      pipes[i].x -= currentSpeed;
      
      if (!pipes[i].passed && pipes[i].x + pipes[i].width < bird.x) {
        pipes[i].passed = true;
        let addScore = 1 * (activePowerups.doubleScore ? 2 : 1) * combo;
        score += addScore;
        comboCounter++;
        
        if (comboCounter >= 3) {
          combo = Math.min(combo + 1, 5);
          comboCounter = 0;
          document.getElementById('comboDisplay').style.display = 'flex';
          document.getElementById('comboValue').innerText = combo;
          setTimeout(() => {
            if (document.getElementById('comboDisplay')) {
              document.getElementById('comboDisplay').style.display = 'none';
            }
          }, 1000);
        }
        
        updateScoreDisplay();
        playSound('score', 0.2);
        
        // Particle celebration
        for (let p = 0; p < 5; p++) {
          addParticle(bird.x, bird.y, 'feather');
        }
      }
    }
    pipes = pipes.filter(p => p.x + p.width > 0);
    
    // Update coins
    for (let i = 0; i < coins.length; i++) {
      coins[i].x -= currentSpeed;
      coins[i].rotation += 0.1;
      
      // Collision with bird
      const dx = bird.x - coins[i].x;
      const dy = bird.y - coins[i].y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      
      if (dist < bird.size + coins[i].width && !coins[i].collected) {
        coins[i].collected = true;
        score += 5 * (activePowerups.doubleScore ? 2 : 1);
        updateScoreDisplay();
        playSound('coin', 0.15);
        addParticle(coins[i].x, coins[i].y, 'coin');
        for (let p = 0; p < 8; p++) {
          addParticle(coins[i].x, coins[i].y, 'coin');
        }
      }
    }
    coins = coins.filter(c => c.x + c.width > 0 && !c.collected);
    
    // Update powerups
    for (let i = 0; i < powerups.length; i++) {
      powerups[i].x -= currentSpeed;
      
      const dx = bird.x - powerups[i].x;
      const dy = bird.y - powerups[i].y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      
      if (dist < bird.size + powerups[i].width && !powerups[i].collected) {
        powerups[i].collected = true;
        activatePowerup(powerups[i].type);
        playSound('powerup', 0.25);
        addParticle(powerups[i].x, powerups[i].y, 'powerup');
      }
    }
    powerups = powerups.filter(p => p.x + p.width > 0 && !p.collected);
    
    // Spawn objects
    if (frame % 80 === 0) spawnPipe();
    if (frame % 30 === 0) spawnCoin();
    if (frame % 200 === 0) spawnPowerup();
    
    // Update particles
    for (let i = 0; i < particles.length; i++) {
      particles[i].x += particles[i].vx;
      particles[i].y += particles[i].vy;
      particles[i].vy += 0.1;
      particles[i].life -= 0.02;
    }
    particles = particles.filter(p => p.life > 0);
    
    // Update screen shake
    if (screenShake > 0) screenShake--;
    
    // Collision detection
    if (!bird.invincible) {
      // Ground and ceiling
      if (bird.y + bird.size > canvas.height - 50 || bird.y - bird.size < 0) {
        gameOver();
        return;
      }
      
      // Pipe collision
      for (const pipe of pipes) {
        const birdLeft = bird.x - bird.size;
        const birdRight = bird.x + bird.size;
        const birdTop = bird.y - bird.size;
        const birdBottom = bird.y + bird.size;
        
        const pipeLeft = pipe.x;
        const pipeRight = pipe.x + pipe.width;
        const topPipeBottom = pipe.topHeight;
        const bottomPipeTop = pipe.topHeight + pipe.gap;
        
        if (birdRight > pipeLeft && birdLeft < pipeRight) {
          if (birdTop < topPipeBottom || birdBottom > bottomPipeTop) {
            gameOver();
            return;
          }
        }
      }
    }
  }
  
  function activatePowerup(type) {
    activePowerups[type] = true;
    const durations = { shield: 5000, slowmo: 4000, doubleScore: 6000 };
    powerupTimers[type] = durations[type] / 16; // Convert to frames approx
    
    let message = '';
    switch(type) {
      case 'shield': message = '🛡️ SHIELD ACTIVATED! Invincible!'; bird.invincible = true; bird.invincibleTimer = durations[type] / 16; break;
      case 'slowmo': message = '🐢 SLOW MOTION! Time slows down!'; break;
      case 'doubleScore': message = '2x SCORE! Points doubled!'; break;
    }
    
    const indicator = document.getElementById('powerupIndicator');
    indicator.innerHTML = message;
    indicator.style.display = 'block';
    setTimeout(() => {
      if (indicator.style.display === 'block') indicator.style.display = 'none';
    }, 2000);
  }
  
  function updateScoreDisplay() {
    document.getElementById('scoreValue').innerText = score;
    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem('flappyBest', bestScore);
      document.getElementById('bestValue').innerText = bestScore;
    }
  }
  
  function gameOver() {
    gameRunning = false;
    addExplosion(bird.x, bird.y);
    playSound('hit', 0.4);
    
    setTimeout(() => {
      if (confirm(`🔥 GAME OVER! 🔥\n\nScore: ${score}\nBest: ${bestScore}\nCombo: x${combo}\n\nPlay again?`)) {
        resetGame();
      } else {
        location.reload();
      }
    }, 100);
  }
  
  function resetGame() {
    // Reset all game state
    bird = {
      x: 100,
      y: 300,
      vy: 0,
      gravity: 0.4,
      jumpPower: -7.5,
      size: 18,
      rotation: 0,
      invincible: false,
      invincibleTimer: 0
    };
    pipes = [];
    coins = [];
    powerups = [];
    particles = [];
    score = 0;
    combo = 1;
    comboCounter = 0;
    gameSpeed = 3;
    baseSpeed = 3;
    frame = 0;
    activePowerups = { shield: false, slowmo: false, doubleScore: false };
    
    updateScoreDisplay();
    document.getElementById('comboDisplay').style.display = 'none';
    document.getElementById('powerupIndicator').style.display = 'none';
    
    gameRunning = true;
    if (gameLoop) cancelAnimationFrame(gameLoop);
    gameLoop = requestAnimationFrame(drawLoop);
  }
  
  function flap() {
    if (!gameRunning) {
      initAudio();
      resetGame();
      return;
    }
    bird.vy = bird.jumpPower;
    bird.rotation = -Math.PI / 4;
    playSound('flap', 0.15);
    
    // Add wing flap particles
    for (let i = 0; i < 3; i++) {
      addParticle(bird.x - 10, bird.y, 'feather');
    }
  }
  
  // ========== DRAWING ENGINE ==========
  function drawBackground() {
    // Gradient sky
    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grad.addColorStop(0, '#0a0a2a');
    grad.addColorStop(0.5, '#1a1a4a');
    grad.addColorStop(1, '#2a1a3a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Stars
    for (let i = 0; i < 100; i++) {
      if (Math.random() > 0.99) {
        ctx.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.5})`;
        ctx.fillRect((i * 131) % canvas.width, (frame + i * 50) % canvas.height, 2, 2);
      }
    }
    
    // Ground
    ctx.fillStyle = '#2d5a1e';
    ctx.fillRect(0, canvas.height - 50, canvas.width, 50);
    ctx.fillStyle = '#3a7a2a';
    for (let i = 0; i < canvas.width; i += 20) {
      ctx.fillRect(i + (frame % 40), canvas.height - 50, 15, 8);
    }
    ctx.fillStyle = '#5a9a3a';
    ctx.fillRect(0, canvas.height - 55, canvas.width, 5);
  }
  
  function drawBird() {
    ctx.save();
    ctx.translate(bird.x, bird.y);
    ctx.rotate(bird.rotation);
    
    // Flashing effect for invincibility
    if (bird.invincible && Math.floor(Date.now() / 100) % 2 === 0) {
      ctx.shadowBlur = 20;
      ctx.shadowColor = '#0ff';
    }
    
    // Body gradient
    const grad = ctx.createLinearGradient(-15, -10, 15, 10);
    grad.addColorStop(0, '#ffcc00');
    grad.addColorStop(1, '#ff9900');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(0, 0, 18, 15, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Wing
    ctx.fillStyle = '#ff8800';
    ctx.beginPath();
    ctx.ellipse(-8, 4, 12, 8, -0.5, 0, Math.PI * 2);
    ctx.fill();
    
    // Eye
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(8, -5, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(10, -5, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(11, -6, 1, 0, Math.PI * 2);
    ctx.fill();
    
    // Beak
    ctx.fillStyle = '#ff4400';
    ctx.beginPath();
    ctx.moveTo(16, -3);
    ctx.lineTo(26, 0);
    ctx.lineTo(16, 3);
    ctx.fill();
    
    ctx.restore();
  }
  
  function drawPipe(x, topHeight, gap) {
    // Top pipe
    const grad = ctx.createLinearGradient(x, 0, x + 60, 0);
    grad.addColorStop(0, '#1a5a1a');
    grad.addColorStop(1, '#2a7a2a');
    ctx.fillStyle = grad;
    ctx.fillRect(x, 0, 60, topHeight);
    
    // Top cap
    ctx.fillStyle = '#3a9a3a';
    ctx.fillRect(x - 8, topHeight - 30, 76, 30);
    
    // Bottom pipe
    ctx.fillStyle = grad;
    ctx.fillRect(x, topHeight + gap, 60, canvas.height - topHeight - gap - 50);
    
    // Bottom cap
    ctx.fillStyle = '#3a9a3a';
    ctx.fillRect(x - 8, topHeight + gap, 76, 30);
    
    // Glow effect
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#0f0';
    ctx.shadowBlur = 0;
  }
  
  function drawCoin(coin) {
    ctx.save();
    ctx.translate(coin.x, coin.y);
    ctx.rotate(coin.rotation);
    ctx.fillStyle = '#ffdd00';
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#ff0';
    ctx.beginPath();
    ctx.ellipse(0, 0, 8, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffaa00';
    ctx.beginPath();
    ctx.ellipse(0, 0, 5, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ff0';
    ctx.font = 'bold 12px monospace';
    ctx.fillText('★', -3, 4);
    ctx.restore();
  }
  
  function drawPowerup(powerup) {
    ctx.save();
    ctx.translate(powerup.x, powerup.y);
    ctx.fillStyle = powerup.type === 'shield' ? '#00ffff' : (powerup.type === 'slowmo' ? '#ff00ff' : '#ffaa00');
    ctx.shadowBlur = 15;
    ctx.shadowColor = ctx.fillStyle;
    ctx.beginPath();
    ctx.rect(-8, -8, 16, 16);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px monospace';
    ctx.fillText(powerup.type === 'shield' ? '🛡️' : (powerup.type === 'slowmo' ? '🐢' : '2x'), -4, 4);
    ctx.restore();
  }
  
  function drawParticles() {
    for (const p of particles) {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x, p.y, p.size, p.size);
    }
    ctx.globalAlpha = 1;
  }
  
  function drawLoop() {
    // Apply screen shake
    ctx.save();
    if (screenShake > 0) {
      ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
    }
    
    drawBackground();
    
    for (const pipe of pipes) {
      drawPipe(pipe.x, pipe.topHeight, pipe.gap);
    }
    
    for (const coin of coins) {
      drawCoin(coin);
    }
    
    for (const powerup of powerups) {
      drawPowerup(powerup);
    }
    
    drawBird();
    drawParticles();
    
    ctx.restore();
    
    if (gameRunning) {
      updateGame();
    }
    
    gameLoop = requestAnimationFrame(drawLoop);
  }
  
  // Event listeners
  function handleFlap(e) {
    if (e.type === 'keydown') {
      if (e.code === 'Space' || e.code === 'ArrowUp') {
        e.preventDefault();
        flap();
      }
    } else {
      e.preventDefault();
      flap();
    }
  }
  
  document.addEventListener('keydown', handleFlap);
  canvas.addEventListener('click', handleFlap);
  canvas.addEventListener('touchstart', handleFlap);
  
  // Initialize
  bestScore = localStorage.getItem('flappyBest') || 0;
  document.getElementById('bestValue').innerText = bestScore;
  
  // Start game in waiting mode
  gameRunning = false;
  drawBackground();
  drawBird();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 16px monospace';
  ctx.shadowBlur = 0;
  ctx.fillText('⚡ CLICK / SPACE to START ⚡', canvas.width/2 - 130, canvas.height/2);
  
  gameLoop = requestAnimationFrame(drawLoop);
  
  console.log('🔥 Abu the bakar! 🔥');
</script>
</body>
</html>
