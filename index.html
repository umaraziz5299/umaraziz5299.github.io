<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Flappy Bird · Game Login Portal</title>
    <!-- Firebase SDKs (modular, v9+) -->
    <script type="module">
        // Import Firebase modules with YOUR actual configuration
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";
        
        // YOUR FIREBASE CONFIGURATION (from Flappy Bird Game project)
        const firebaseConfig = {
            apiKey: "AIzaSyAUAFEoA8yf1Ynz0GyTMdgEvJUujkwOync",
            authDomain: "flappy-bird-game-cf732.firebaseapp.com",
            projectId: "flappy-bird-game-cf732",
            storageBucket: "flappy-bird-game-cf732.firebasestorage.app",
            messagingSenderId: "291292686940",
            appId: "1:291292686940:web:b58ee2e4e2dbf2c78e5499",
            measurementId: "G-89JX9K36NK"
        };
        
        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const analytics = getAnalytics(app);
        
        // DOM elements
        const loginForm = document.getElementById('login-form');
        const signupForm = document.getElementById('signup-form');
        const gameDashboard = document.getElementById('game-dashboard');
        const authTabs = document.getElementById('auth-tabs');
        
        // Inputs - Login
        const loginEmail = document.getElementById('login-email');
        const loginPassword = document.getElementById('login-password');
        const loginError = document.getElementById('login-error');
        
        // Inputs - Signup
        const signupEmail = document.getElementById('signup-email');
        const signupPassword = document.getElementById('signup-password');
        const signupConfirm = document.getElementById('signup-confirm');
        const signupError = document.getElementById('signup-error');
        
        // Dashboard info
        const userEmailSpan = document.getElementById('user-email');
        const logoutBtn = document.getElementById('logout-btn');
        const gameLaunchBtn = document.getElementById('game-launch-btn');
        const gameMessage = document.getElementById('game-message');
        
        // Tab switching
        const showLoginBtn = document.getElementById('show-login');
        const showSignupBtn = document.getElementById('show-signup');
        const loginPanel = document.getElementById('login-panel');
        const signupPanel = document.getElementById('signup-panel');
        
        // Helper: clear errors
        function clearErrors() {
            loginError.textContent = '';
            signupError.textContent = '';
        }
        
        // Helper: show game dashboard and hide auth panels
        function showGameDashboard(user) {
            authTabs.classList.add('hidden');
            loginForm.classList.add('hidden');
            signupForm.classList.add('hidden');
            gameDashboard.classList.remove('hidden');
            userEmailSpan.textContent = user.email;
            gameMessage.innerHTML = "🐦 Welcome to Flappy Bird! 🎮<br>Tap 'Play Game' to start flying!";
        }
        
        // Helper: show auth UI
        function showAuthUI() {
            authTabs.classList.remove('hidden');
            loginPanel.classList.remove('hidden');
            signupPanel.classList.add('hidden');
            loginForm.classList.remove('hidden');
            signupForm.classList.add('hidden');
            gameDashboard.classList.add('hidden');
            clearErrors();
            loginEmail.value = '';
            loginPassword.value = '';
            signupEmail.value = '';
            signupPassword.value = '';
            signupConfirm.value = '';
        }
        
        // Listen to authentication state
        onAuthStateChanged(auth, (user) => {
            if (user) {
                showGameDashboard(user);
                console.log("✅ User signed in:", user.email);
            } else {
                showAuthUI();
                console.log("👋 No user signed in");
            }
        });
        
        // LOGIN existing user
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearErrors();
            const email = loginEmail.value.trim();
            const password = loginPassword.value;
            
            if (!email || !password) {
                loginError.textContent = "Please enter email and password.";
                return;
            }
            
            try {
                await signInWithEmailAndPassword(auth, email, password);
                loginError.textContent = "";
            } catch (error) {
                console.error("Login error:", error);
                let friendlyMsg = "Login failed. ";
                switch (error.code) {
                    case 'auth/invalid-email':
                        friendlyMsg += "Invalid email format.";
                        break;
                    case 'auth/user-disabled':
                        friendlyMsg += "Account disabled.";
                        break;
                    case 'auth/user-not-found':
                        friendlyMsg += "No account found. Please sign up first.";
                        break;
                    case 'auth/wrong-password':
                        friendlyMsg += "Incorrect password.";
                        break;
                    default:
                        friendlyMsg += error.message;
                }
                loginError.textContent = friendlyMsg;
            }
        });
        
        // SIGNUP new user
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearErrors();
            const email = signupEmail.value.trim();
            const password = signupPassword.value;
            const confirm = signupConfirm.value;
            
            if (!email || !password || !confirm) {
                signupError.textContent = "All fields are required.";
                return;
            }
            if (password !== confirm) {
                signupError.textContent = "Passwords do not match.";
                return;
            }
            if (password.length < 6) {
                signupError.textContent = "Password must be at least 6 characters.";
                return;
            }
            
            try {
                await createUserWithEmailAndPassword(auth, email, password);
                signupError.textContent = "";
            } catch (error) {
                console.error("Signup error:", error);
                let friendlyMsg = "Signup failed. ";
                switch (error.code) {
                    case 'auth/email-already-in-use':
                        friendlyMsg += "Email already registered. Try logging in.";
                        break;
                    case 'auth/invalid-email':
                        friendlyMsg += "Invalid email address.";
                        break;
                    case 'auth/weak-password':
                        friendlyMsg += "Password is too weak (use 6+ chars).";
                        break;
                    default:
                        friendlyMsg += error.message;
                }
                signupError.textContent = friendlyMsg;
            }
        });
        
        // LOGOUT
        logoutBtn.addEventListener('click', async () => {
            try {
                await signOut(auth);
                gameMessage.innerHTML = "";
            } catch (error) {
                console.error("Logout error:", error);
                alert("Error signing out. Please try again.");
            }
        });
        
        // GAME LAUNCH (Flappy Bird integration)
        gameLaunchBtn.addEventListener('click', () => {
            // You can replace this with your actual Flappy Bird game code
            gameMessage.innerHTML = "🐦 FLAPPY BIRD LAUNCHING! 🎮<br>🕹️ Press SPACE or Click to flap!<br>⭐ Score: 0 | Best: 0";
            gameMessage.style.animation = "none";
            gameMessage.offsetHeight;
            gameMessage.style.animation = "flicker 0.3s ease";
            setTimeout(() => {
                gameMessage.style.animation = "";
            }, 400);
            
            // For actual game integration, you can do:
            // window.location.href = "/flappy-bird-game.html";
            // Or load your game canvas here
            console.log("🎮 Game launched for:", userEmailSpan.textContent);
        });
        
        // TAB SWITCHING
        showLoginBtn.addEventListener('click', () => {
            loginPanel.classList.remove('hidden');
            signupPanel.classList.add('hidden');
            clearErrors();
        });
        
        showSignupBtn.addEventListener('click', () => {
            loginPanel.classList.add('hidden');
            signupPanel.classList.remove('hidden');
            clearErrors();
        });
        
        // Session status updater
        setInterval(() => {
            if (auth.currentUser && !gameDashboard.classList.contains('hidden')) {
                const statusDiv = document.getElementById('session-status');
                if (statusDiv) {
                    const now = new Date();
                    statusDiv.textContent = `🟢 Connected to Firebase · ${now.toLocaleTimeString()}`;
                }
            }
        }, 1000);
        
        console.log("🔥 Firebase initialized with your Flappy Bird project!");
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a472a 0%, #0a2a1a 100%);
            font-family: 'Courier New', 'Press Start 2P', 'Segoe UI', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Animated background clouds/birds */
        body::before {
            content: "🐦";
            position: absolute;
            font-size: 60px;
            opacity: 0.1;
            animation: fly 20s linear infinite;
            top: 20%;
            left: -50px;
        }
        
        body::after {
            content: "🐤";
            position: absolute;
            font-size: 40px;
            opacity: 0.1;
            animation: fly 25s linear infinite reverse;
            top: 60%;
            left: -50px;
        }
        
        @keyframes fly {
            from {
                transform: translateX(0) translateY(0);
                opacity: 0.1;
            }
            to {
                transform: translateX(110vw) translateY(-20px);
                opacity: 0.3;
            }
        }

        /* Main game portal card */
        .portal-card {
            background: rgba(46, 34, 21, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 3px solid #ffcc44;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5), 0 0 30px rgba(255, 204, 68, 0.3);
            width: 100%;
            max-width: 520px;
            padding: 2rem 1.8rem;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
        }

        h1, h2 {
            text-align: center;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .game-title {
            font-size: 2rem;
            background: linear-gradient(135deg, #ffcc44, #ff9933);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 8px rgba(255, 204, 68, 0.4);
            margin-bottom: 0.5rem;
            font-family: 'Courier New', monospace;
        }

        .sub {
            text-align: center;
            color: #ffcc88;
            font-size: 0.7rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px dashed #ccaa55;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
        }

        /* Tabs */
        .tab-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 1.8rem;
        }
        
        .tab-btn {
            background: rgba(30, 20, 10, 0.9);
            border: 2px solid #ffaa33;
            color: #ffdd99;
            padding: 10px 28px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            font-size: 1rem;
            letter-spacing: 1px;
        }
        
        .tab-btn:hover {
            background: #cc8833;
            border-color: #ffeeaa;
            color: #1a0a00;
            box-shadow: 0 0 12px #ffaa44;
            transform: scale(1.05);
        }

        /* panels */
        .auth-panel {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 28px;
            padding: 1.5rem;
            margin-top: 0.5rem;
            border: 1px solid #ffaa44;
        }
        
        .input-group {
            margin-bottom: 1.2rem;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #ffdd99;
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        
        input {
            width: 100%;
            padding: 12px 18px;
            background: #2a1a0a;
            border: 2px solid #cc8844;
            border-radius: 40px;
            color: #ffeecc;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
            font-family: monospace;
        }
        
        input:focus {
            border-color: #ffcc44;
            box-shadow: 0 0 12px rgba(255, 204, 68, 0.5);
            background: #3a2818;
        }
        
        .btn-primary {
            background: linear-gradient(95deg, #cc8833, #ffaa44);
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.1rem;
            color: #1a0a00;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
            font-family: inherit;
            letter-spacing: 1px;
        }
        
        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 0 15px #ffcc44;
            background: linear-gradient(95deg, #dd9944, #ffbb55);
        }
        
        .error-msg {
            color: #ffaa88;
            font-size: 0.75rem;
            margin-top: 8px;
            text-align: center;
            background: rgba(255, 68, 68, 0.2);
            border-radius: 20px;
            padding: 5px;
        }
        
        .game-dashboard {
            text-align: center;
        }
        
        .avatar-icon {
            font-size: 4rem;
            margin: 20px 0;
            animation: bounce 1s ease infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .user-badge {
            background: #2a1a0a;
            border-radius: 60px;
            padding: 8px 16px;
            display: inline-block;
            margin: 15px 0;
            border-left: 3px solid #ffcc44;
            border-right: 3px solid #ffcc44;
            font-weight: bold;
            color: #ffdd99;
            font-size: 0.85rem;
        }
        
        .game-action-btn {
            background: linear-gradient(145deg, #44aa44, #228822);
            width: 80%;
            margin: 20px auto;
            padding: 14px;
            font-size: 1.2rem;
            border: none;
            border-radius: 80px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 0 #0a4a0a;
            font-family: monospace;
        }
        
        .game-action-btn:active {
            transform: translateY(2px);
            box-shadow: 0 3px 0 #0a4a0a;
        }
        
        .logout-btn {
            background: transparent;
            border: 2px solid #ff8866;
            color: #ffaa88;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.2s;
            font-family: monospace;
        }
        
        .logout-btn:hover {
            background: #ff4d4d20;
            border-color: #ffaa88;
            color: white;
        }
        
        .game-message {
            background: #1a0a00cc;
            padding: 20px;
            border-radius: 28px;
            margin: 20px 0;
            font-size: 0.9rem;
            border: 2px solid #ffcc44;
            color: #ffeecc;
            word-break: break-word;
            line-height: 1.6;
        }
        
        .hidden {
            display: none;
        }
        
        .session-status {
            font-size: 0.7rem;
            color: #ccaa77;
            margin-top: 20px;
            text-align: center;
        }
        
        @keyframes flicker {
            0% { opacity: 0.7; text-shadow: 0 0 2px #ffcc44; }
            100% { opacity: 1; text-shadow: 0 0 12px #ffaa44; }
        }
        
        hr {
            border-color: #ccaa55;
            margin: 10px 0;
        }
        
        footer {
            font-size: 0.65rem;
            text-align: center;
            margin-top: 20px;
            color: #ccaa77;
        }
    </style>
</head>
<body>
<div class="portal-card">
    <h1 class="game-title">🐦 FLAPPY BIRD 🐦</h1>
    <div style="text-align: center;"><span class="sub">[ Firebase Login System ]</span></div>
    
    <!-- Auth Tabs -->
    <div id="auth-tabs">
        <div class="tab-buttons">
            <button id="show-login" class="tab-btn">🔐 LOGIN</button>
            <button id="show-signup" class="tab-btn">✨ SIGN UP</button>
        </div>
        
        <!-- LOGIN PANEL -->
        <div id="login-panel" class="auth-panel">
            <form id="login-form">
                <div class="input-group">
                    <label>📧 EMAIL</label>
                    <input type="email" id="login-email" placeholder="your@email.com" autocomplete="email">
                </div>
                <div class="input-group">
                    <label>🔒 PASSWORD</label>
                    <input type="password" id="login-password" placeholder="••••••••">
                </div>
                <button type="submit" class="btn-primary">🐦 PLAY NOW 🐦</button>
                <div id="login-error" class="error-msg"></div>
            </form>
        </div>
        
        <!-- SIGNUP PANEL -->
        <div id="signup-panel" class="auth-panel hidden">
            <form id="signup-form">
                <div class="input-group">
                    <label>📧 EMAIL</label>
                    <input type="email" id="signup-email" placeholder="newplayer@example.com" autocomplete="email">
                </div>
                <div class="input-group">
                    <label>🔑 PASSWORD (min 6 chars)</label>
                    <input type="password" id="signup-password" placeholder="create password">
                </div>
                <div class="input-group">
                    <label>✅ CONFIRM PASSWORD</label>
                    <input type="password" id="signup-confirm" placeholder="confirm password">
                </div>
                <button type="submit" class="btn-primary">✨ CREATE ACCOUNT ✨</button>
                <div id="signup-error" class="error-msg"></div>
            </form>
        </div>
    </div>
    
    <!-- GAME DASHBOARD -->
    <div id="game-dashboard" class="game-dashboard hidden">
        <div class="avatar-icon">🐦🎮</div>
        <div class="user-badge" id="user-email">player@example.com</div>
        <div id="game-message" class="game-message">
            🎮 Ready to play Flappy Bird?<br>
            Sign in to start your adventure!
        </div>
        <button id="game-launch-btn" class="game-action-btn">🎮 PLAY FLAPPY BIRD 🎮</button>
        <button id="logout-btn" class="logout-btn">🚪 LOGOUT</button>
        <div id="session-status" class="session-status">🟡 Connecting to Firebase...</div>
        <hr>
        <footer>🔥 Connected to Flappy Bird Firebase · Secure Login</footer>
    </div>
</div>
</body>
</html>
